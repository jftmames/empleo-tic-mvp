version: "3.8"

services:
  streamlit:
    build: .
    container_name: empleo-tic-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  jupyter:
    build: .
    container_name: empleo-tic-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data:ro
      - ./outputs:/app/outputs
    entrypoint:
      [
        "jupyter",
        "lab",
        "--ip=0.0.0.0",
        "--port=8888",
        "--no-browser",
        "--allow-root",
        "--NotebookApp.token=",
        "--NotebookApp.password=",
      ]
    restart: unless-stopped
